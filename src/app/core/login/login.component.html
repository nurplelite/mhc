<div class="login-module">
  <mat-card>
    <mat-card-title>Login</mat-card-title>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" required autocomplete="on" placeholder="Enter your email" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Password</mat-label>
        <input matInput formControlName="passwd" type="password" required autocomplete="on" placeholder="Enter your password" />
      </mat-form-field>
      <button mat-raised-button type="submit" [disabled]="loginForm.invalid">Login</button>
    </form>
    <div class='button-label'><span>Don't have an account?</span></div>
    <button mat-raised-button routerLink="/register">Register</button>
  </mat-card>
</div>
<div class="register-module">
  <app-registration></app-registration>
</div>
